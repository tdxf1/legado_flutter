<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书架 - 列表视图 (Material 3)</title>
    <!-- 引入 Material Symbols 图标库 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            /* MD3 配色方案 (柔性绿色系) */
            --md-primary: #006a4d;
            --md-on-primary: #ffffff;
            --md-surface: #fbfcf8;
            --md-surface-variant: #dae5da;
            --md-on-surface: #191c1a;
            --md-on-surface-variant: #3f4942;
            --md-outline: #6f7971;
            --md-shadow: rgba(0, 0, 0, 0.06);
            --md-elevation-level-1: 0px 1px 3px var(--md-shadow), 0px 1px 2px 0px var(--md-shadow);
            
            --font-family: "Roboto", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #e6e9e6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--md-on-surface);
        }

        /* 模拟手机屏幕容器 */
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--md-surface);
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ---------------- 顶部应用栏 ---------------- */
        .top-bar {
            background-color: var(--md-surface);
            padding-top: 12px;
            flex-shrink: 0;
            z-index: 10;
        }

        .top-bar-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 16px 8px 16px;
            gap: 8px;
        }

        .icon-btn {
            border: none;
            background: transparent;
            color: var(--md-on-surface-variant);
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background-color: rgba(0, 106, 77, 0.08);
        }

        .icon-btn .material-symbols-outlined {
            font-size: 24px;
        }

        /* 顶部标签页 */
        .tabs {
            display: flex;
            padding: 0 16px;
            position: relative;
        }

        .tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            color: var(--md-on-surface-variant);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--md-primary);
        }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%; 
            height: 3px;
            background-color: var(--md-primary);
            border-radius: 3px 3px 0 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ---------------- 列表视图 (List View) ---------------- */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 80px; 
        }

        .scroll-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .list-item {
            display: flex;
            align-items: stretch;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .list-item:active {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        /* 封面区域 */
        .list-cover-wrapper {
            flex-shrink: 0;
            width: 80px;
            aspect-ratio: 2 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--md-surface-variant);
            box-shadow: var(--md-elevation-level-1);
        }

        .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            padding: 4px;
            line-height: 1.2;
        }

        /* 书籍信息区域 */
        .list-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding-right: 40px; /* 给进度徽章留出空间 */
        }

        .list-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--md-on-surface);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-meta-row {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--md-on-surface-variant);
            font-size: 12px;
            margin-top: 2px;
        }
        
        .list-chapter-row {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--md-on-surface-variant);
            font-size: 12px;
            color: #5d6761;
        }

        .list-chapter-row .material-symbols-outlined {
            font-size: 14px;
            color: #9aa59e;
        }

        /* 阅读进度徽章 */
        .list-badge {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background-color: #e0e5e0;
            color: var(--md-on-surface-variant);
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
        }

        /* ---------------- 底部导航栏 ---------------- */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--md-surface);
            height: 64px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--md-on-surface-variant);
            transition: all 0.2s;
            position: relative;
        }

        .nav-item .material-symbols-outlined {
            font-size: 26px;
        }

        .nav-item.active {
            color: var(--md-primary);
        }

        .nav-indicator {
            position: absolute;
            bottom: 0;
            width: 16px;
            height: 3px;
            background-color: var(--md-primary);
            border-radius: 3px;
            display: none;
        }

        .nav-item.active .nav-indicator {
            display: block;
        }

        .nav-item.center-btn {
            position: relative;
            top: -12px;
            width: 48px;
            height: 48px;
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0, 106, 77, 0.3);
        }
        .nav-item.center-btn:hover {
            box-shadow: 0 6px 12px rgba(0, 106, 77, 0.4);
        }
        .nav-item.center-btn.active {
            color: var(--md-on-primary);
        }
        .nav-item.center-btn .nav-indicator {
            display: none;
        }

    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 顶部导航区域 -->
    <header class="top-bar">
        <div class="top-bar-actions">
            <button class="icon-btn" aria-label="搜索">
                <span class="material-symbols-outlined">search</span>
            </button>
            <button class="icon-btn" aria-label="更多选项">
                <span class="material-symbols-outlined">more_vert</span>
            </button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="selectTab(this, '全部')">全部</div>
            <div class="tab" onclick="selectTab(this, '本地')">本地</div>
            <div class="tab-indicator" id="tabIndicator"></div>
        </div>
    </header>

    <!-- 书架主要内容 -->
    <div class="scroll-content" id="listContainer">
        <!-- 书籍列表项将通过 JS 动态插入 -->
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <span class="material-symbols-outlined">menu_book</span>
            <div class="nav-indicator"></div>
        </button>
        
        <button class="nav-item center-btn">
            <span class="material-symbols-outlined">explore</span>
        </button>

        <button class="nav-item">
            <span class="material-symbols-outlined">add_circle</span>
            <div class="nav-indicator"></div>
        </button>

        <button class="nav-item">
            <span class="material-symbols-outlined">person</span>
            <div class="nav-indicator"></div>
        </button>
    </nav>
</div>

<script>
    // 数据 (模拟原图截图中的信息)
    const booksListData = [
        { 
            title: "和巫妖同僚的学术聚会", 
            color: "#5c6b73", 
            textColor: "#ffffff",
            author: "梦野咲子",
            chapters: ["第644章 搞一场大的", "第866章 大结局"],
            progress: 222 
        },
        { 
            title: "重生后，我选择默默修仙", 
            color: "#2d3e50", 
            textColor: "#ffffff",
            author: "微辣也辣",
            chapters: ["第146章：新的挑战已经出现", "第553章：路线"],
            progress: 406 
        },
        { 
            title: "系统很抽象，还好我也是", 
            color: "#f5f7f8", 
            textColor: "#191c1a",
            author: "扑街天线",
            chapters: ["第66章 数学题里也有爱情", "番外·原来我不是主角啊"],
            progress: 614 
        },
        { 
            title: "食仙主", 
            color: "#1e3b4d", 
            textColor: "#e6f2f5",
            author: "鹦鹉咬舌",
            chapters: ["第787章 幻楼宴（二）", "第934章 周书（十六）"],
            progress: 153 
        },
        { 
            title: "下班，然后变成魔法少女", 
            color: "#9a8c98", 
            textColor: "#ffffff",
            author: "弧盐",
            chapters: ["第004章 不明通话", "第234章 舆论发酵"],
            progress: 377 
        },
        { 
            title: "哥布林重度依赖", 
            color: "#c9b1a3", 
            textColor: "#3e2723",
            author: "咸鱼翻身",
            chapters: ["第12章 捡到一只哥布林", "第15章 这就是爱吗"],
            progress: 34 
        },
        { 
            title: "山山有药", 
            color: "#4a7c59", 
            textColor: "#ffffff",
            author: "采药人",
            chapters: ["第101章 千年人参", "第102章 奇遇"],
            progress: 511 
        }
    ];

    const container = document.getElementById('listContainer');

    // 渲染列表
    booksListData.forEach(book => {
        const item = document.createElement('div');
        item.className = 'list-item';

        const angle = Math.floor(Math.random() * 360);
        const gradient = `linear-gradient(${angle}deg, ${book.color}, ${book.color}dd)`;

        // 构建章节的 HTML
        let chaptersHtml = '';
        book.chapters.forEach(chapter => {
            chaptersHtml += `
                <div class="list-chapter-row">
                    <span class="material-symbols-outlined" style="font-size:12px;">radio_button_unchecked</span>
                    <span>${chapter}</span>
                </div>
            `;
        });

        item.innerHTML = `
            <div class="list-cover-wrapper">
                <div class="cover-placeholder" style="background: ${gradient}; color: ${book.textColor};">
                    <span>${book.title.substring(0, 4)}</span>
                </div>
            </div>
            
            <div class="list-info">
                <div class="list-title">${book.title}</div>
                <div class="list-meta-row">
                    <span class="material-symbols-outlined" style="font-size:14px; color:#9aa59e;">person</span>
                    <span>${book.author}</span>
                </div>
                ${chaptersHtml}
            </div>

            <div class="list-badge">${book.progress}</div>
        `;
        container.appendChild(item);
    });

    // 简单的 Tab 切换逻辑
    function selectTab(element, tabName) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');

        const indicator = document.getElementById('tabIndicator');
        const rect = element.getBoundingClientRect();
        const containerRect = element.parentElement.getBoundingClientRect();
        
        const leftOffset = rect.left - containerRect.left;
        indicator.style.transform = `translateX(${leftOffset}px)`;
        indicator.style.width = `${rect.width}px`;
    }

    // 初始化指示线位置
    window.onload = function() {
        const firstTab = document.querySelector('.tab.active');
        if(firstTab) {
            const indicator = document.getElementById('tabIndicator');
            const rect = firstTab.getBoundingClientRect();
            const containerRect = firstTab.parentElement.getBoundingClientRect();
            const leftOffset = rect.left - containerRect.left;
            indicator.style.width = `${rect.width}px`;
            indicator.style.transform = `translateX(${leftOffset}px)`;
        }
    }

</script>

</body>
</html>
