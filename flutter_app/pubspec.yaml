name: legado_flutter
description: Legado Flutter - 基于Flutter+Rust重构的开源阅读应用
publish_to: 'none'
version: 0.1.1+2

environment:
  # 批次 BATCH-06: sdk 下限 3.0.0 → 3.3.0，与 mobile_scanner 5.x 要求对齐
  # （F-W3-043 P3）。pubspec.lock 已 commit，进一步固定运行时版本。
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理 - Riverpod 2.x提供类型安全的状态管理，编译期检查依赖关系
  flutter_riverpod: ^2.4.0
  
  # 路由管理 - go_router提供声明式路由和深度链接支持
  go_router: ^14.0.0

  # MD3 动态取色 - Android 12+ Monet 壁纸取色 / 跨平台预设色
  dynamic_color: ^1.7.0
  
  # FFI桥接 - flutter_rust_bridge自动生成Dart与Rust的绑定代码
  flutter_rust_bridge: ^2.0.0
  
  # 应用目录获取 - path_provider提供跨平台的应用文档/缓存目录路径
  path_provider: ^2.1.0
  
  # 不可变数据模型 - freezed_annotation配合代码生成创建联合类型和数据类
  freezed_annotation: ^2.4.0

  # 本地通知 - 显示下载进度等后台通知
  flutter_local_notifications: ^18.0.0

  # 封面缓存 - 网络图片下载到本地磁盘并缓存
  cached_network_image: ^3.4.0
  crypto: ^3.0.3
  dio: ^5.0.0
  webview_flutter: ^4.8.0
  file_picker: ^11.0.2
  flutter_tts: ^4.2.2

  # 系统分享 - share_plus 调用 Android/iOS 原生 share intent，
  # 用于长按菜单的"分享当前页"动作（批次 5）
  share_plus: ^11.1.0

  # 高刷模式 - 在支持 120Hz 屏的安卓机型上启用高刷新率，仿真翻页等动画更跟手
  flutter_displaymode: ^0.6.0

  # 批次 1 (05-18): 屏幕亮度调节 — reader 内的亮度滑杆，退出 reader 自动复位
  # 不影响系统亮度（应用级亮度，跨平台 iOS/Android/macOS/Windows 支持，Linux 暂无）。
  screen_brightness: ^2.1.4

  # 批次 1 (05-18): 屏幕常亮 — 进 reader 默认开 wakelock 防止系统超时熄屏。
  wakelock_plus: ^1.2.10

  # 批次 20 (05-19): QR 扫码导入 — Android/iOS/macOS/web 通用相机扫码插件。
  # 5.x 版本配套 Flutter ≥ 3.16，Dart SDK ≥ 3.3。
  mobile_scanner: ^5.0.0

  # BATCH-03 (F-W2B-001): 凭据保险柜 — Android Keystore / iOS Keychain。
  # v9 默认走 EncryptedSharedPreferences (Keystore-backed AES/GCM)，与项目 minSdk 23+ 对齐。
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # 代码生成器 - build_runner驱动freezed和flutter_rust_bridge代码生成
  build_runner: ^2.4.0
  
  # 数据模型生成器 - freezed自动生成copyWith、toString等方法
  freezed: ^2.4.0

flutter:
  uses-material-design: true
  
  # 资源文件目录
